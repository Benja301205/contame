<!-- @dsCard group="Type" viewport="700x220" name="Body · Space Grotesk" subtitle="UI + body copy across five weights" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { background: var(--bg); padding: 22px 24px; color: var(--ink); }
  .lead { font-size: 22px; line-height: 1.32; max-width: 52ch; }
  .copy { font-size: 16px; line-height: 1.55; color: var(--ink-dim); max-width: 56ch; margin-top: 12px; }
  .weights { display:flex; gap: 22px; margin-top: 16px; flex-wrap: wrap; }
  .weights span { font-size: 20px; }
  .meta { font-family: var(--font-mono); font-size: 11px; letter-spacing:.14em; text-transform:uppercase; color: var(--ink-faint); margin-top: 14px; }
</style>
</head>
<body>
  <div class="lead">¿Qué mantendrías de la experiencia? Eso que no podía faltar.</div>
  <div class="copy">Lectura cualitativa y conteos con criterio — no solo promedios. Un tablero que se entiende de una sola pasada.</div>
  <div class="weights">
    <span style="font-weight:300">Light 300</span>
    <span style="font-weight:400">Regular 400</span>
    <span style="font-weight:500">Medium 500</span>
    <span style="font-weight:600">Semi 600</span>
    <span style="font-weight:700">Bold 700</span>
  </div>
  <div class="meta">Space Grotesk · --font-sans</div>
</body>
</html>
