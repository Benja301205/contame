<!-- @dsCard group="Colors" viewport="700x150" name="Ink ramp" subtitle="Warm cream text from strong to faint" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { background: var(--bg); padding: 20px; }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; }
  .chip { height: 78px; border: 1px solid var(--line); border-radius: var(--radius-sm); }
  .name { font-family: var(--font-mono); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink); margin-top: 10px; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--ink-faint); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink)"></div><div class="name">--ink</div><div class="hex">#f5ede1 · primary</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-dim)"></div><div class="name">--ink-dim</div><div class="hex">#b8a89e · secondary</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-faint)"></div><div class="name">--ink-faint</div><div class="hex">#6b5b52 · tertiary</div></div>
  </div>
</body>
</html>
