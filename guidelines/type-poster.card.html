<!-- @dsCard group="Type" viewport="700x200" name="Poster · Bebas Neue" subtitle="Condensed uppercase headline with serif accent" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { background: var(--bg); padding: 18px 24px; }
  .poster { font-family: var(--font-condensed); font-weight: 400; font-size: 92px; line-height: .86; text-transform: uppercase; letter-spacing: -0.01em; color: var(--ink); }
  .poster em { font-family: var(--font-display); font-style: italic; text-transform: none; color: var(--hot); font-size: 1.05em; }
  .meta { font-family: var(--font-mono); font-size: 11px; letter-spacing:.14em; text-transform:uppercase; color: var(--ink-faint); margin-top: 14px; }
</style>
</head>
<body>
  <div class="poster">Feedback que <em>se lee</em></div>
  <div class="meta">Bebas Neue · 400 · --font-condensed · clamp poster scale</div>
</body>
</html>
