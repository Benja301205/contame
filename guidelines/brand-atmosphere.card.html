<!-- @dsCard group="Brand" viewport="700x240" name="Atmosphere" subtitle="Radial ember wash + film-grain noise — the lit-room background" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { height: 100%; }
  body { background: var(--bg); position: relative; overflow: hidden; }
  body::before { content:""; position:absolute; inset:0; background: var(--wash-hero); pointer-events:none; }
  body::after { content:""; position:absolute; inset:0; opacity: var(--noise-opacity); mix-blend-mode: overlay; background-image: var(--noise-url); pointer-events:none; }
  .center { position: relative; z-index: 2; height: 100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap: 16px; }
  .chili { width: 76px; transform: rotate(-6deg); }
  .cap { font-family: var(--font-mono); font-size: 10px; letter-spacing:.22em; text-transform:uppercase; color: var(--ink-faint); }
  .head { font-family: var(--font-condensed); font-size: 34px; text-transform:uppercase; color: var(--ink); line-height:.9; white-space:nowrap; }
  .head em { font-family: var(--font-display); font-style:italic; text-transform:none; color: var(--hot); }
</style>
</head>
<body>
  <div class="center">
    <img class="chili" src="../assets/chili.png" alt="" />
    <div class="head">cómo fue <em>tu</em> experiencia</div>
    <div class="cap">--wash-hero · --noise-url · .contame-atmosphere</div>
  </div>
</body>
</html>
