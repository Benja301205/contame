<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces" subtitle="Warm roasted-ember backgrounds — never neutral grey" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { background: var(--bg); padding: 20px; }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; }
  .chip { height: 78px; border: 1px solid var(--line); border-radius: var(--radius-sm); }
  .name { font-family: var(--font-mono); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink); margin-top: 10px; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--ink-faint); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--bg)"></div><div class="name">--bg</div><div class="hex">#1a0908 · page</div></div>
    <div class="sw"><div class="chip" style="background:var(--bg-2)"></div><div class="name">--bg-2</div><div class="hex">#2a1311 · raised</div></div>
    <div class="sw"><div class="chip" style="background:var(--bg-3)"></div><div class="name">--bg-3</div><div class="hex">#381916 · hover</div></div>
    <div class="sw"><div class="chip" style="background:var(--surface-card); backdrop-filter:blur(2px)"></div><div class="name">--surface-card</div><div class="hex">bg-2 @ 40%</div></div>
  </div>
</body>
</html>
