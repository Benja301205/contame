<!-- @dsCard group="Colors" viewport="700x150" name="Status" subtitle="Promoter / passive / detractor — green, ember, hot" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { background: var(--bg); padding: 20px; }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; }
  .chip { height: 78px; border-radius: var(--radius-sm); display:flex; align-items:flex-end; padding:10px; }
  .v { font-family: var(--font-display); font-style: italic; font-size: 30px; line-height:1; color: var(--bg); }
  .name { font-family: var(--font-mono); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink); margin-top: 10px; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--ink-faint); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--positive)"><span class="v">9.7</span></div><div class="name">--positive</div><div class="hex">#87d68b · promoters</div></div>
    <div class="sw"><div class="chip" style="background:var(--warning)"><span class="v">7.2</span></div><div class="name">--warning</div><div class="hex">#ffb86b · passives</div></div>
    <div class="sw"><div class="chip" style="background:var(--negative)"><span class="v">4.1</span></div><div class="name">--negative</div><div class="hex">#ff4500 · detractors</div></div>
    <div class="sw"><div class="chip" style="background:var(--destructive)"></div><div class="name">--destructive</div><div class="hex">#e5332a</div></div>
  </div>
</body>
</html>
