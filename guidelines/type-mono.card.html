<!-- @dsCard group="Type" viewport="700x180" name="Mono · JetBrains Mono" subtitle="Eyebrows, labels & numeric meta — always uppercase, wide tracking" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { background: var(--bg); padding: 22px 24px; display:flex; flex-direction:column; gap: 16px; }
  .eb { font-family: var(--font-mono); font-size: 11px; letter-spacing:.18em; text-transform:uppercase; color: var(--ink-dim); }
  .label-hot { font-family: var(--font-mono); font-size: 12px; letter-spacing:.12em; color: var(--hot); }
  .rail { font-family: var(--font-mono); font-size: 10px; letter-spacing:.28em; text-transform:uppercase; color: var(--ink-faint); }
  .meta { font-family: var(--font-mono); font-size: 11px; letter-spacing:.14em; text-transform:uppercase; color: var(--ink-faint); }
</style>
</head>
<body>
  <div class="eb">Análisis de feedback · Caso real</div>
  <div class="label-hot">Q19 · 102 comentarios</div>
  <div class="rail">Buenos Aires · Argentina · 2026</div>
  <div class="meta">JetBrains Mono · 400 / 500 · --font-mono</div>
</body>
</html>
