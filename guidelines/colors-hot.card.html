<!-- @dsCard group="Colors" viewport="700x150" name="Hot · picante" subtitle="The single accent — orange-red, with flame and ember neighbors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { background: var(--bg); padding: 20px; }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; }
  .chip { height: 78px; border-radius: var(--radius-sm); }
  .name { font-family: var(--font-mono); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink); margin-top: 10px; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--ink-faint); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--hot-2)"></div><div class="name">--hot-2</div><div class="hex">#ff7a3c</div></div>
    <div class="sw"><div class="chip" style="background:var(--hot); box-shadow:var(--glow-lg)"></div><div class="name">--hot</div><div class="hex">#ff4500 · primary</div></div>
    <div class="sw"><div class="chip" style="background:var(--hot-deep)"></div><div class="name">--hot-deep</div><div class="hex">#c43201</div></div>
    <div class="sw"><div class="chip" style="background:var(--ember)"></div><div class="name">--ember</div><div class="hex">#ffb86b</div></div>
  </div>
</body>
</html>
