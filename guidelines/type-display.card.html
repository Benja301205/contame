<!-- @dsCard group="Type" viewport="700x180" name="Display · Instrument Serif" subtitle="Italic serif for emotional accent words & big numbers" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { background: var(--bg); padding: 22px 24px; }
  .big { font-family: var(--font-display); font-style: italic; font-size: 72px; line-height: .9; color: var(--ink); letter-spacing: -0.02em; }
  .big em { color: var(--hot); font-style: italic; }
  .meta { font-family: var(--font-mono); font-size: 11px; letter-spacing:.14em; text-transform:uppercase; color: var(--ink-faint); margin-top: 16px; }
</style>
</head>
<body>
  <div class="big">Contanos <em>cómo</em> la viviste.</div>
  <div class="meta">Instrument Serif · italic · 400 · --font-display</div>
</body>
</html>
