<!-- @dsCard group="Brand" viewport="700x200" name="Big number" subtitle="Oversized italic serif numerals — the hero stat treatment" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { background: var(--bg); padding: 20px 24px; display:flex; align-items:center; gap: 40px; }
  .k { font-family: var(--font-mono); font-size: 11px; letter-spacing:.16em; text-transform:uppercase; color: var(--ink-dim); }
  .big { font-family: var(--font-display); font-style: italic; font-size: 150px; line-height: .9; color: var(--hot); letter-spacing: -0.03em; }
  .verdict { font-family: var(--font-condensed); font-size: 22px; letter-spacing:.08em; text-transform:uppercase; color: var(--ink); }
  .stack { display:flex; flex-direction:column; }
  .nums { display:flex; flex-direction:column; gap: 14px; }
  .small { font-family: var(--font-display); font-style:italic; font-size: 40px; line-height:1; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing:.14em; text-transform:uppercase; color: var(--ink-dim); }
</style>
</head>
<body>
  <div class="stack">
    <div class="k">Lo recomendarían</div>
    <div class="big">9.98</div>
    <div class="verdict">100 de 102 pusieron 10</div>
  </div>
  <div class="nums">
    <div><div class="small" style="color:var(--positive)">9.76</div><div class="lbl">Promotores</div></div>
    <div><div class="small" style="color:var(--ember)">7.20</div><div class="lbl">Pasivos</div></div>
  </div>
</body>
</html>
