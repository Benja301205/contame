<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="4px base · roomy editorial rhythm" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { background: var(--bg); padding: 22px 24px; }
  .scale { display:flex; align-items:flex-end; gap: 14px; }
  .col { display:flex; flex-direction:column; align-items:flex-start; gap: 8px; }
  .bar { background: var(--hot); height: 14px; border-radius: 2px; }
  .n { font-family: var(--font-mono); font-size: 10px; letter-spacing:.06em; color: var(--ink-dim); }
  .meta { font-family: var(--font-mono); font-size: 11px; letter-spacing:.14em; text-transform:uppercase; color: var(--ink-faint); margin-top: 18px; }
</style>
</head>
<body>
  <div class="scale">
    <div class="col"><div class="bar" style="width:4px"></div><div class="n">4</div></div>
    <div class="col"><div class="bar" style="width:8px"></div><div class="n">8</div></div>
    <div class="col"><div class="bar" style="width:12px"></div><div class="n">12</div></div>
    <div class="col"><div class="bar" style="width:16px"></div><div class="n">16</div></div>
    <div class="col"><div class="bar" style="width:24px"></div><div class="n">24</div></div>
    <div class="col"><div class="bar" style="width:32px"></div><div class="n">32</div></div>
    <div class="col"><div class="bar" style="width:48px"></div><div class="n">48</div></div>
    <div class="col"><div class="bar" style="width:56px"></div><div class="n">56</div></div>
    <div class="col"><div class="bar" style="width:72px"></div><div class="n">72</div></div>
    <div class="col"><div class="bar" style="width:88px"></div><div class="n">88</div></div>
  </div>
  <div class="meta">--space-1 … --space-22 · sections breathe at 56–88px</div>
</body>
</html>
