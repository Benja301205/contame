<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { background: var(--bg); padding: 26px; }
  .stack { display: flex; flex-direction: column; gap: 32px; }
  .qtext { font-size: 18px; color: var(--ink); margin-bottom: 16px; max-width: 52ch; }
  .cap { font-family: var(--font-mono); font-size: 10px; letter-spacing:.14em; text-transform:uppercase; color: var(--ink-faint); margin-bottom: 12px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { HeatMeter, TextField } = window.ContameDesignSystem_8cf950;
    function Demo() {
      const [score, setScore] = React.useState(4);
      const [text, setText] = React.useState("La energía del cierre, sin dudas.");
      return (
        <div className="stack">
          <div>
            <div className="cap">HeatMeter · escala 1–5</div>
            <p className="qtext">¿Qué tan probable es que te anotes en la próxima edición?</p>
            <HeatMeter value={score} onChange={setScore} />
          </div>
          <div>
            <div className="cap">TextField · abierta</div>
            <TextField multiline meta="Abierta" value={text} onChange={setText}
              placeholder="Eso que no podía faltar…" />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
