<!-- @dsCard group="Components" viewport="700x460" name="Data — StatCard, MetricBar, Quote" subtitle="Hero stat block, comparison rows & verbatim pull-quote" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { background: var(--bg); padding: 26px; }
  .grid { display: grid; grid-template-columns: 300px 1fr; gap: 28px; align-items: start; }
  .list { border-top: 1px solid var(--line); }
  .cap { font-family: var(--font-mono); font-size: 10px; letter-spacing:.14em; text-transform:uppercase; color: var(--ink-faint); margin-bottom: 12px; }
  .col { display: flex; flex-direction: column; gap: 28px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { StatCard, MetricBar, Quote } = window.ContameDesignSystem_8cf950;
    function Demo() {
      return (
        <div className="grid">
          <StatCard label="Lo recomendarían" value="9.98" verdict="100 de 102 pusieron 10"
            breakdown={[
              { value: "9.76", label: "General", tone: "positive" },
              { value: "9.53", label: "Organización", tone: "warning" },
              { value: "8.60", label: "Mentores", tone: "negative" },
            ]} />
          <div className="col">
            <div>
              <div className="cap">MetricBar · escala 1–10</div>
              <div className="list">
                <MetricBar label="Calificación general" value={9.76} />
                <MetricBar label="Organización" caption="Q3" value={9.53} />
                <MetricBar label="Mentores" value={8.6} tone="low" />
              </div>
            </div>
            <div>
              <div className="cap">Quote · verbatim</div>
              <Quote category="Lo que más gustó" meta="Verbatim · sin corrección">
                La energía del cierre fue otra cosa.
              </Quote>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
