<!-- @dsCard group="Slides" viewport="1280x720" name="Big stat slide" subtitle="One oversized italic-serif number carries the slide" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="slide.css" />
<style>
  body { background: var(--bg); margin: 0; }
  .stat-wrap { display: grid; grid-template-columns: 1fr auto; gap: 56px; align-items: center; }
  .big { font-family: var(--font-display); font-style: italic; font-size: 380px; line-height: 0.82; color: var(--hot); letter-spacing: -0.04em; }
  .k { font-family: var(--font-mono); font-size: 16px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-dim); }
  .verdict { font-family: var(--font-condensed); font-size: 40px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink); margin-top: 8px; }
  .cells { display: flex; flex-direction: column; gap: 28px; border-left: 1px solid var(--line); padding-left: 40px; }
  .cell .v { font-family: var(--font-display); font-style: italic; font-size: 64px; line-height: 1; }
  .cell .l { font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-dim); }
</style>
</head>
<body>
  <div class="slide">
    <div class="slide-brand"><img src="../assets/chili.png" alt="" /><span class="name">contame<sup>03</sup></span></div>
    <div class="spacer"></div>
    <div class="stat-wrap">
      <div>
        <div class="k">Lo recomendarían · 102 respuestas</div>
        <div class="big">9.98</div>
        <div class="verdict">100 de 102 pusieron 10</div>
      </div>
      <div class="cells">
        <div class="cell"><div class="v" style="color:var(--positive)">9.76</div><div class="l">Calif. general</div></div>
        <div class="cell"><div class="v" style="color:var(--ember)">9.53</div><div class="l">Organización</div></div>
        <div class="cell"><div class="v" style="color:var(--hot)">8.60</div><div class="l">Mentores · mín</div></div>
      </div>
    </div>
    <div class="spacer"></div>
    <div class="slide-foot"><span>Métricas generales</span><span>02 / 04</span></div>
  </div>
</body>
</html>
