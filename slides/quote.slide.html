<!-- @dsCard group="Slides" viewport="1280x720" name="Quote slide" subtitle="Verbatim pull-quote in big italic serif" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="slide.css" />
<style>
  body { background: var(--bg); margin: 0; }
  .mark { font-family: var(--font-display); font-style: italic; font-size: 200px; line-height: 0.4; color: var(--hot); }
  .q { font-family: var(--font-display); font-style: italic; font-size: 76px; line-height: 1.12; color: var(--ink); max-width: 20ch; margin-top: 8px; }
  .cat { font-family: var(--font-mono); font-size: 14px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-dim); margin-top: 36px; }
  .bar { width: 80px; height: 2px; background: var(--hot); box-shadow: var(--glow-md); margin-top: 14px; }
</style>
</head>
<body>
  <div class="slide">
    <div class="slide-brand"><img src="../assets/chili.png" alt="" /><span class="name">contame<sup>03</sup></span></div>
    <div class="spacer"></div>
    <div class="mark">&#8220;</div>
    <p class="q">La energía del cierre fue otra cosa. Me llevo eso.</p>
    <div class="cat">Lo que más gustó · Verbatim · sin corrección</div>
    <div class="bar"></div>
    <div class="spacer"></div>
    <div class="slide-foot"><span>Citas destacadas</span><span>03 / 04</span></div>
  </div>
</body>
</html>
