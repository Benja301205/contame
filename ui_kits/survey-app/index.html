<!-- @startingPoint section="Survey app" subtitle="Click-through feedback survey (landing → form → results)" viewport="1280x820" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>contame · Survey app</title>
<link rel="stylesheet" href="../../styles.css" />
<link rel="stylesheet" href="app.css" />
<style> html, body { background: var(--bg); } </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script src="data.js"></script>
  <script type="text/babel" src="Topbar.jsx"></script>
  <script type="text/babel" src="LandingScreen.jsx"></script>
  <script type="text/babel" src="FormScreen.jsx"></script>
  <script type="text/babel" src="ResultsScreen.jsx"></script>
  <script type="text/babel">
    function App() {
      const [route, setRoute] = React.useState("landing");
      const [submitted, setSubmitted] = React.useState(false);
      const [resultsMode, setResultsMode] = React.useState("done"); // "done" | "full"

      const go = (r) => {
        if (r === "results") { setRoute("results"); setResultsMode(submitted ? "full" : "done"); }
        else setRoute(r);
        window.scrollTo(0, 0);
      };
      const handleSubmit = () => { setSubmitted(true); setResultsMode("done"); window.scrollTo(0, 0); };
      const reset = () => { setSubmitted(false); setRoute("form"); window.scrollTo(0, 0); };

      return (
        <div className="app app-bg">
          <Topbar route={route} go={go} submitted={submitted} />
          {route === "landing" && <LandingScreen go={go} />}
          {route === "form" && <FormScreen go={go} onSubmit={handleSubmit} />}
          {route === "results" && (
            <ResultsScreen
              go={go}
              justSubmitted={submitted && resultsMode === "done"}
              onSeeFull={() => { setResultsMode("full"); window.scrollTo(0, 0); }}
              onReset={reset}
            />
          )}
          <AppFooter />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
